<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكاني - تسجيل الطلبات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f0f2f5;
        }
        /* تعديل الألوان لتناسب البني الكموني */
        .cumin-bg { background-color: #8C6239; }
        .cumin-text { color: #8C6239; }
        .btn-primary {
            background-color: #8C6239;
            color: white;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #6A4A2A;
            transform: translateY(-1px);
        }
        .input-field {
            border: 1px solid #ccd0d5;
            border-radius: 8px;
            padding: 12px;
            width: 100%;
            outline: none;
        }
        .input-field:focus {
            border-color: #8C6239;
            box-shadow: 0 0 0 2px rgba(140, 98, 57, 0.2);
        }
        #loadingOverlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
    </style>
</head>
<body class="p-4">

    <div id="loadingOverlay">
        <div class="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-white mb-4"></div>
        <p class="text-lg font-bold">جاري رفع البيانات...</p>
        <p class="text-sm opacity-75">يرجى عدم إغلاق الصفحة</p>
    </div>

    <div class="max-w-lg mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">
        <div class="cumin-bg p-8 text-center">
            <img src="logo1.png" alt="مكاني" class="h-24 mx-auto mb-2 object-contain" onerror="this.src='https://via.placeholder.com/200x100?text=Logo1.png'">
            <p class="text-orange-100 text-sm">نظام إدارة ميدانية</p>
        </div>

        <form id="orderForm" class="p-6 space-y-5">
            <div>
                <label class="block text-sm font-bold cumin-text mb-1">اختر المنطقة <span class="text-red-500">*</span></label>
                <select id="region" name="region" class="input-field" required onchange="filterNames()">
                    <option value="">-- اختر المنطقة --</option>
                    <option value="الرياض">الرياض</option>
                    <option value="تبوك">تبوك</option>
                    <option value="الغربيه">المنطقة الغربية</option>
                    <option value="الشرقية">المنطقة الشرقية</option>
                    <option value="حائل">حائل</option>
                    <option value="الجنوبية">المنطقة الجنوبية</option>
                    <option value="المدينة">المدينة</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold cumin-text mb-1">اسم المندوب <span class="text-red-500">*</span></label>
                <select id="delegateName" name="delegateName" class="input-field" required disabled>
                    <option value="">اختر المنطقة أولاً</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-sm font-bold cumin-text mb-1">رقم الطلب</label>
                    <input type="text" id="orderNumber" name="orderNumber" class="input-field" placeholder="0000">
                </div>
                <div class="col-span-2 sm:col-span-1">
                    <label class="block text-sm font-bold cumin-text mb-1">عدد اللوحات </label>
                    <input type="number" name="platesCount" class="input-field" placeholder="1" min="1">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold cumin-text mb-1">العنوان الوطني </label>
                <textarea name="nationalAddress" class="input-field" rows="2" placeholder="أدخل تفاصيل العنوان"></textarea>
            </div>

            <div>
                <label class="block text-sm font-bold cumin-text mb-1">صور الطلب </label>
                <input type="file" id="photos" name="photos" class="input-field bg-gray-50" multiple accept="image/*">
                <p class="text-[10px] text-gray-400 mt-1">يمكنك ترك الصور فارغة أو رفع أكثر من صورة</p>
            </div>

            <button type="submit" class="w-full btn-primary font-bold py-4 rounded-xl shadow-lg text-lg">
                إرسال البيانات
            </button>
        </form>

        <div id="message" class="hidden m-6 p-4 rounded-xl text-center font-bold"></div>
    </div>

    <script>
        const delegates = [
            { name: "صالح جبران", region: "الرياض" },
            { name: "ابو كيان", region: "تبوك" },
            { name: "امجد الحداد", region: "الرياض" },
            { name: "رضوان الحداد", region: "الجنوبية" },
            { name: "محمد نجيب", region: "الغربيه" },
            { name: "محمد نجيب", region: "الرياض" },
            { name: "أحمد معان", region: "الغربيه" },
            { name: "عمر الزبيدي", region: "الرياض" },
            { name: "سامي عمر", region: "حائل" },
            { name: "جميل محيرز", region: "الرياض" },
            { name: "ابو عامر", region: "الرياض" },
            { name: "رامي", region: "الشرقية" },
            { name: "سالم", region: "الشرقية" },
            { name: "ناصر", region: "الشرقية" },
            { name: "صالح اليافعي", region: "الشرقية" },
            { name: "سالم نيازي", region: "الشرقية" },
            { name: "عمر هادي", region: "المدينة" },
            { name: "علي عبد الرحمن", region: "الشرقية" }
        ];

        // تم التعديل إلى الرابط الجديد المطلوب
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwKZnRb5vMfiBZH1hZDmxDdxWyWErQS1lue_m8N4Gxn9_EzwfGJrbZ8QvSKyXMIB_mQ/exec"; 

        function filterNames() {
            const region = document.getElementById('region').value;
            const nameSelect = document.getElementById('delegateName');
            nameSelect.innerHTML = '<option value="">-- اختر الاسم --</option>';
            
            if (region) {
                const filtered = delegates.filter(d => d.region === region);
                filtered.forEach(d => {
                    const opt = document.createElement('option');
                    opt.value = d.name;
                    opt.textContent = d.name;
                    nameSelect.appendChild(opt);
                });
                nameSelect.disabled = false;
            } else {
                nameSelect.disabled = true;
            }
        }

        document.getElementById('orderForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const msgDiv = document.getElementById('message');
            const overlay = document.getElementById('loadingOverlay');

            if (WEB_APP_URL.includes("YOUR_SCRIPT_URL")) {
                showMessage("خطأ: لم يتم ضبط رابط السكربت!", "bg-red-100 text-red-700");
                return;
            }

            overlay.style.display = 'flex';
            msgDiv.classList.add('hidden');

            try {
                const form = e.target;
                const formData = new FormData(form);
                const files = document.getElementById('photos').files;
                
                const regionVal = formData.get('region');
                const delegateNameVal = formData.get('delegateName');
                const orderNumberVal = formData.get('orderNumber') || "بدون رقم";
                const nationalAddressVal = formData.get('nationalAddress') || "غير متوفر";
                const platesCountVal = formData.get('platesCount') || "0";

                const photoPromises = Array.from(files).map((file, index) => {
                    return new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => {
                            const extension = file.name.split('.').pop();
                            const newFileName = `${orderNumberVal} - ${delegateNameVal} - ${regionVal} - لوحة ${index + 1}.${extension}`;
                            
                            resolve({
                                name: newFileName,
                                type: file.type,
                                data: e.target.result.split(',')[1]
                            });
                        };
                        reader.onerror = reject;
                        reader.readAsDataURL(file);
                    });
                });

                const photosBase64 = await Promise.all(photoPromises);

                const payload = {
                    region: regionVal,
                    delegateName: delegateNameVal,
                    orderNumber: orderNumberVal,
                    nationalAddress: nationalAddressVal,
                    platesCount: platesCountVal,
                    photos: photosBase64
                };

                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });

                showMessage("تم إرسال البيانات بنجاح ✅", "bg-green-100 text-green-700");
                form.reset();
                document.getElementById('delegateName').disabled = true;

            } catch (error) {
                console.error(error);
                showMessage("خطأ في الاتصال: تأكد من إعدادات النشر والرابط", "bg-red-100 text-red-700");
            } finally {
                overlay.style.display = 'none';
            }
        });

        function showMessage(text, classes) {
            const msgDiv = document.getElementById('message');
            msgDiv.textContent = text;
            msgDiv.className = `m-6 p-4 rounded-xl text-center font-bold ${classes}`;
            msgDiv.classList.remove('hidden');
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>
</body>
</html>
